<div class="custom-form-card">

    <form id="addVendorForm" class="admin-form reuse_vendor" onsubmit="handleVendor(event); return false;">

        <div class="row">
                  <!-- Restaurant -->
                  <div class="col-md-6 mb-3">
                    <label for="restaurant" class="form-label">Restaurant</label>
                    <select id="resturantData" class="form-select" required>

                    </select>
                  </div>

                  <!-- Owner Name -->
                  <div class="col-md-6 mb-3">
                    <label for="ownerName" class="form-label">Owner Name</label>
                    <input type="text" class="form-control" id="ownerName" placeholder="Enter owner name" required>
                  </div>

                  <!-- Email -->
                  <div class="col-md-6 mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter email" required>
                  </div>

                  <!-- Phone -->
                  <div class="col-md-6 mb-3">
                    <label for="phone" class="form-label">Phone</label>
                    <input type="number" class="form-control" id="phone" placeholder="Enter phone number" required>
                  </div>

                  <!-- Password -->
                  <div class="col-md-6 mb-3">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter password" required>
                  </div>

                  <!-- Bank Name -->
                  <div class="col-md-6 mb-3">
                    <label for="bankName" class="form-label">Bank Name</label>
                    <input type="text" class="form-control" id="bankName" placeholder="Enter bank name" required>
                  </div>

                  <!-- Account Number -->
                  <div class="col-md-6 mb-3">
                    <label for="accountNumber" class="form-label">Account Number</label>
                    <input type="number" class="form-control" id="accountNumber" placeholder="Enter account number" required>
                  </div>

                  <!-- IFSC Code -->
                  <div class="col-md-6 mb-3">
                    <label for="ifscCode" class="form-label">IFSC Code</label>
                    <input type="text" class="form-control" id="ifscCode" placeholder="Enter IFSC code" required>
                  </div>

                  <!-- UPI ID -->
                  <div class="col-md-6 mb-3">
                    <label for="upiId" class="form-label">UPI ID</label>
                    <input type="text" class="form-control" id="upiId" placeholder="Enter UPI ID" required>
                  </div>

                  <!-- GST Number -->
                  <div class="col-md-6 mb-3">
                    <label for="gstNumber" class="form-label">GST Number</label>
                    <input type="text" class="form-control" id="gstNumber" placeholder="Enter GST number">
                  </div>

                  <!-- PAN Number -->
                  <div class="col-md-6 mb-3">
                    <label for="panNumber" class="form-label">PAN Number</label>
                    <input type="text" class="form-control" id="panNumber" placeholder="Enter PAN number">
                  </div>

                </div>
                              
              

        <div class="admin-form-actions">
            <button type="submit" class="admin-btn admin-btn-primary">
                <i class="ti ti-device-floppy me-1"></i>
                Save Vendor
            </button>

            <button type="reset" class="admin-btn admin-btn-secondary">
                Clear
            </button>
        </div>
      </div>
