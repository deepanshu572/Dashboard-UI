      <div class="custom-form-card">

              <form id="addResturantForm" onsubmit="handleResturant(event);">
                 <div class="row">

                    <!-- Restaurant Name -->
                    <div class="col-md-6 mb-3">
                      <label for="restaurantName" class="form-label">Restaurant Name</label>
                      <input type="text" class="form-control" id="restaurantName" placeholder="Enter restaurant name" required>
                    </div>

                    <!-- Slug -->
                    <div class="col-md-6 mb-3">
                      <label for="restaurantSlug" class="form-label">Slug</label>
                      <input type="text" class="form-control" id="restaurantSlug" placeholder="restaurant-name" required>
                    </div>

                    <!-- Description -->
                    <div class="col-12 mb-3">
                      <label for="restaurantDescription" class="form-label">Description</label>
                      <textarea class="form-control" id="restaurantDescription" rows="4" placeholder="Enter restaurant description"></textarea>
                    </div>

                    <!-- Logo -->
                    <div class="col-md-6 mb-3">
                      <label for="restaurantLogo" class="form-label">Logo</label>
                      <input type="file" class="form-control" id="restaurantLogo">
                    </div>

                    <!-- Cover Image -->
                    <div class="col-md-6 mb-3">
                      <label for="coverImage" class="form-label">Cover Image</label>
                      <input type="file" class="form-control" id="coverImage">
                    </div>

                    <!-- Phone -->
                    <div class="col-md-6 mb-3">
                      <label for="restaurantPhone" class="form-label">Phone</label>
                      <input type="number" class="form-control" id="restaurantPhone" placeholder="Enter phone number" required>
                    </div>

                    <!-- Email -->
                    <div class="col-md-6 mb-3">
                      <label for="restaurantEmail" class="form-label">Email</label>
                      <input type="email" class="form-control" id="restaurantEmail" placeholder="Enter email" required>
                    </div>

                    <!-- Address -->
                    <div class="col-12 mb-3">
                      <label for="restaurantAddress" class="form-label">Address</label>
                      <textarea class="form-control" id="restaurantAddress" rows="3" placeholder="Enter address"></textarea>
                    </div>

                    <!-- City -->
                    <div class="col-md-4 mb-3">
                      <label for="restaurantCity" class="form-label">City</label>
                      <input type="text" class="form-control" id="restaurantCity" placeholder="Enter city">
                    </div>

                    <!-- State -->
                    <div class="col-md-4 mb-3">
                      <label for="restaurantState" class="form-label">State</label>
                      <input type="text" class="form-control" id="restaurantState" placeholder="Enter state">
                    </div>

                    <!-- Pincode -->
                    <div class="col-md-4 mb-3">
                      <label for="restaurantPincode" class="form-label">Pincode</label>
                      <input type="number" class="form-control" id="restaurantPincode" placeholder="Enter pincode">
                    </div>

                    <!-- Opening Time -->
                    <div class="col-md-6 mb-3">
                      <label for="openingTime" class="form-label">Opening Time</label>
                      <input type="time" class="form-control" id="openingTime">
                    </div>

                    <!-- Closing Time -->
                    <div class="col-md-6 mb-3">
                      <label for="closingTime" class="form-label">Closing Time</label>
                      <input type="time" class="form-control" id="closingTime">
                    </div>

                    <!-- Minimum Order Amount -->
                    <div class="col-md-6 mb-3">
                      <label for="minimumOrderAmount" class="form-label">Minimum Order Amount</label>
                      <input type="number" class="form-control" id="minimumOrderAmount" placeholder="0.00">
                    </div>

                    <!-- Delivery Charge -->
                    <div class="col-md-6 mb-3">
                      <label for="deliveryCharge" class="form-label">Delivery Charge</label>
                      <input type="number" class="form-control" id="deliveryCharge" placeholder="0.00">
                    </div>

                    <!-- Commission Percent -->
                    <div class="col-md-6 mb-3">
                      <label for="commissionPercent" class="form-label">Commission Percent</label>
                      <input type="number" class="form-control" id="commissionPercent" placeholder="0">
                    </div>

                    <!-- Average Rating -->
                    <div class="col-md-3 mb-3">
                      <label for="avgRating" class="form-label">Average Rating</label>
                      <input type="number" step="0.1" class="form-control" id="avgRating" placeholder="0.0" value="0">
                    </div>

                    <!-- Total Reviews -->
                    <div class="col-md-3 mb-3">
                      <label for="totalReviews" class="form-label">Total Reviews</label>
                      <input type="number" class="form-control" id="totalReviews" placeholder="0" value="0">
                    </div>

                  </div>
               
               <div class="admin-form-actions">
            <button type="submit" class="admin-btn admin-btn-primary">
                <i class="ti ti-device-floppy me-1"></i>
                Add resturant
            </button>

            <button type="reset" class="admin-btn admin-btn-secondary">
                Clear
            </button>
              </div>
