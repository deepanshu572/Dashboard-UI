        <h1 class="page-title">Add Food</h1>

      <div class="custom-form-card">
 
              <form id="addProductForm" onsubmit="handleProduct(event); return false;">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="productName" class="form-label">Food Name</label>
                    <input type="text" class="form-control" id="productName" placeholder="Enter food name" required>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="productFoodType" class="form-label">Food Type</label>
                 <select class="form-select" id="productFoodType" required>
                    <option value="">Select Food Type</option>
                    <option value="nonveg">nonveg</option>
                    <option value="veg">veg</option>
                    <option value="drinks">drinks</option>
                  </select>                  </div>
                </div>
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label for="productPrice" class="form-label">MRP</label>
                    <input type="number" class="form-control" id="productPrice" placeholder="0.00" step="0.01" required>
                  </div>
                  <div class="col-md-6 mb-3">
                    <label for="productSellingPrice" class="form-label">Price</label>
                    <input type="number" class="form-control" id="productSellingPrice" placeholder="0.00" required>
                  </div>
                </div>
                <div class="row">
                    <div class="col-md-6 mb-3">
                    <label for="productPreparationTime" class="form-label">Prepration Time</label>
                    <input type="number" class="form-control" id="productPreparationTime" placeholder="0.00" required>
                  </div>
                <div class="col-md-6 mb-3">
                    <label for="productCalories" class="form-label">Calaroies</label>
                    <input type="number" class="form-control" id="productCalories" placeholder="0.00" required>
                  </div>
                </div>

                <div class="mb-3">
                  <label for="productResturant" class="form-label">Resturant</label>
                  <select class="form-select" id="productResturant" required>
                    
                  </select>
                </div>
                <div class="mb-3">
                  <label for="productCategory" class="form-label">Category</label>
                  <select class="form-select" id="productCategory" required>
                    
                  </select>
                </div>
                <div class="mb-3">
                  <label for="productImage" class="form-label">Product Image</label>
                  <input type="file" class="form-control" id="productImage" accept="image/*" required>
                </div>
              
                <div class="mb-3">
                  <label for="productDescription" class="form-label">Description</label>
                  <textarea class="form-control" id="productDescription" rows="4"
                    placeholder="Enter product description"></textarea>
                </div>
                <div class="admin-form-actions">
            <button type="submit" class="admin-btn admin-btn-primary">
                <i class="ti ti-device-floppy me-1"></i>
                Add Food
            </button>

            <button type="reset" class="admin-btn admin-btn-secondary">
                Clear
            </button>
        </div>
