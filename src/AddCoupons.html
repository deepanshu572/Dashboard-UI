 <main id="content" class="content py-10 main-content">

        <h1 class="page-title">Add Coupons</h1>

    </div>

   
</div>
      <div class="custom-form-card">
       
              <form id="addCouponsForm" onsubmit="handleCoupon(event); return false;">
                 <div class="row">

  <!-- Coupon Code -->
  <div class="col-md-6 mb-3">
    <label for="couponCode" class="form-label">Code</label>
    <input type="text" class="form-control" id="couponCode" placeholder="Enter coupon code" required>
  </div>

  <!-- Discount Type -->
  <div class="col-md-6 mb-3">
    <label for="discountType" class="form-label">Discount Type</label>
    <select class="form-select" id="discountType" required>
      <option value="">Select Discount Type</option>
      <option value="percentage">Percentage</option>
      <option value="fixed">Fixed Amount</option>
    </select>
  </div>

  <!-- Discount Value -->
  <div class="col-md-6 mb-3">
    <label for="discountValue" class="form-label">Discount Value</label>
    <input type="number" class="form-control" id="discountValue" placeholder="0.00" required>
  </div>

  <!-- Minimum Order Amount -->
  <div class="col-md-6 mb-3">
    <label for="minimumOrderAmount" class="form-label">Minimum Order Amount</label>
    <input type="number" class="form-control" id="minimumOrderAmount" placeholder="0.00">
  </div>

  <!-- Max Discount Amount -->
  <div class="col-md-6 mb-3">
    <label for="maxDiscountAmount" class="form-label">Max Discount Amount</label>
    <input type="number" class="form-control" id="maxDiscountAmount" placeholder="0.00">
  </div>

  <!-- Start Date -->
  <div class="col-md-6 mb-3">
    <label for="startDate" class="form-label">Start Date</label>
    <input type="date" class="form-control" id="startDate" required>
  </div>

  <!-- End Date -->
  <div class="col-md-6 mb-3">
    <label for="endDate" class="form-label">End Date</label>
    <input type="date" class="form-control" id="endDate" required>
  </div>

  <!-- Usage Limit -->
  <div class="col-md-6 mb-3">
    <label for="usageLimit" class="form-label">Usage Limit</label>
    <input type="number" class="form-control" id="usageLimit" placeholder="0">
  </div>

  <!-- Used Count -->
  <div class="col-md-6 mb-3">
    <label for="usedCount" class="form-label">Used Count</label>
    <input type="number" class="form-control" id="usedCount" placeholder="0" value="0" readonly>
  </div>

</div>
                              
               
                <div class="admin-form-actions">
            <button type="submit" class="admin-btn admin-btn-primary">
                <i class="ti ti-device-floppy me-1"></i>
                Add Coupons
            </button>

            <button type="reset" class="admin-btn admin-btn-secondary">
                Clear
            </button>
        </div>

              </form>
