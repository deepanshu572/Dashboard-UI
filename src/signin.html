<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Signin - InApp Inventory Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
   <link rel="apple-touch-icon" sizes="180x180" href="./assets/images/favicon_io/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon_io/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="./assets/images/favicon_io/favicon-16x16.png">
  <link rel="manifest" href="./assets/images/favicon_io/site.webmanifest">



</head>

<body>


<div class="container d-flex align-items-center justify-content-center min-vh-100">
  <div class="card login-form " style="max-width:420px; width:100%;">
    <div class="card-body p-5">
      <div class="text-center mb-3">
      <a href="index.html" class="mb-4 d-inline-block"><img src="./assets/images/logo-icon.svg" alt="" width="36">
      <span class=" ms-2"> <img src="./assets/images/logo.svg" alt=""></span>
      </a>
        <h1 class="card-title mb-5 h5">Sign in to your account</h1>

      </div>

      <form class="needs-validation mt-3 " onsubmit="handleLogin(event); return false;">
        <div class="mb-3">
          <label for="name" class="form-label">userName</label>
          <input id="name" type="name" class="form-control" placeholder="admin" required autofocus>
        </div>

        <div class="mb-3">
          <label for="password" class="form-label d-flex justify-content-between">
            <span>Password</span>
          </label>
          <input id="password" type="password" class="form-control" placeholder="Password" required minlength="6">
        </div>

        <div class="d-flex justify-content-between align-items-center mb-3">
          <div class="form-check">
            <input id="remember" class="form-check-input" type="checkbox">
            <label class="form-check-label small" for="remember">Remember me</label>
          </div>
        </div>

        <button class="btn btn-primary w-100" type="submit">Sign in</button>
      </form>

     
    </div>
  </div>
</div>



  <!-- Bootstrap JS -->
  <script src="./assets/js/main.js" type="module"></script>
<script src="./assets/js/jquery.js"></script>

<script>
  let apiUrl = "http://localhost/ITS_Food_Backend/admin/api/";
function handleLogin(e){
 e.preventDefault();
  let name = $("#name").val();
  let password = $("#password").val();
 
  $.ajax({
    url:apiUrl,
    method:"POST",
    dataType:"JSON",
    data:{
      type:"handleLogin",
      name,
      password,
      role:"super_admin"
    },
    success:function (response) {
       if(response.status === "success"){

    localStorage.setItem("adminId", response.data.id);
    localStorage.setItem("adminRole", response.data.role);
    localStorage.setItem("adminName", response.data.name);

    alert("Login Success");
    location.href="index.html"
}
else{
         alert(response.message);
       }
    },
    error: function (xhr,status,err) {
      alert("AJAX ERR:"+ err)
      
    }
  })

}

</script>
</body>

</html>""
